packages:
  - 'apps/*'
  - 'services/*'
  - 'packages/*'

# Delay installing newly published versions (supply-chain protection).
# See docs/developer/pnpm/minimum-release-age.md
minimumReleaseAge: 1440 # minutes (24 hours)
minimumReleaseAgeStrict: true
# @cursor/sdk@1.0.17 is a broken publish (missing webpack chunks); 1.0.18 fixes it.
# 1.0.19 fixes NGHTTP2_FRAME_SIZE_ERROR on tool-call streams (safe-connect-transport).
minimumReleaseAgeExclude:
  - '@cursor/sdk'
  - '@cursor/sdk-darwin-arm64'
  - '@cursor/sdk-darwin-x64'
  - '@cursor/sdk-linux-arm64'
  - '@cursor/sdk-linux-x64'
  - '@cursor/sdk-win32-x64'

allowBuilds:
  '@google/genai': false
  '@sentry/cli': true
  bun: true
  esbuild: true
  koffi: false
  protobufjs: false
  sharp: true
  sqlite3: true
  tesseract.js: true
  unrs-resolver: true
